groups:
  - name: scraper_alerts
    rules:
      - alert: ScraperDown
        expr: up{job="shopee-scrapers"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Scraper {{ $labels.instance }} is down"
          
      - alert: HighErrorRate
        expr: rate(scrape_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.instance }}"
          
      - alert: QueueBacklog
        expr: bull_queue_waiting_count > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Queue backlog detected: {{ $value }} jobs waiting"
          
      - alert: RateLimitApproaching
        expr: rate_limit_remaining < 10
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Rate limit almost exhausted on {{ $labels.instance }}"